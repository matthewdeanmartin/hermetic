site_name: hermetic-seal
site_description: A best efforts sandbox
site_url: https://hermetic.readthedocs.io/en/latest/
repo_url: https://gitlab.com/matthewdeanmartin/hermetic
repo_name: matthewdeanmartin/tuochat

theme:
  name: readthedocs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [ "." ]
          options:
            show_source: false
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Basic Features:
      - CLI Usage: cli-usage.md
      - Programmatic API: programmatic-api.md
      - Profiles: profiles.md
      - Network Guard: guards/network.md
      - Subprocess Guard: guards/subprocess.md
      - Filesystem Guard: guards/filesystem.md
      - Environment Guard: guards/environment.md
      - Dynamic Code Guard: guards/dynamic-code.md
      - Import Policy Guard: guards/import-policy.md
      - Interpreter Mutation Guard: guards/interpreter.md
      - Native Imports Guard: guards/native-imports.md
  - Advanced:
      - Threat Model: threat-model.md
      - Bootstrap Mode: bootstrap-mode.md
      - Sealed Mode: sealed-mode.md
      - Tracing and Debugging: tracing.md
      - Testing Patterns: testing.md
  - Safety and Compliance:
      - Security: security.md
      - Dependency Provenance: dependency-provenance.md
  - API Reference:
      - Reference: api-reference.md
  - Contributing:
      - Contributing Guide: contributing/CONTRIBUTING.md
      - AI Policy: contributing/AI.md
